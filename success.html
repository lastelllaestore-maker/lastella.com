<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You | LASTELLA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#fff,#fdecef);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

padding:20px;

}

.success-card{

width:500px;

max-width:100%;

background:#fff;

padding:45px;

border-radius:25px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.10);

animation:fadeIn .6s ease;

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.check{

width:110px;

height:110px;

margin:auto;

background:#d4af37;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:60px;

color:white;

margin-bottom:25px;

}

h1{

color:#d4af37;

margin-bottom:15px;

font-size:34px;

}

p{

color:#666;

line-height:1.8;

margin-bottom:35px;

}

.order-box{

background:#fff7ea;

padding:18px;

border-radius:12px;

margin-bottom:30px;

}

.order-box h3{

margin-bottom:10px;

color:#333;

}

.order-box p{

margin:6px 0;

}

.button{

display:inline-block;

width:100%;

background:#d4af37;

color:white;

padding:16px;

text-decoration:none;

font-size:18px;

font-weight:600;

border-radius:50px;

transition:.3s;

}

.button:hover{

background:#b99220;

transform:translateY(-3px);

}

.small{

margin-top:20px;

font-size:14px;

color:#888;

}

@media(max-width:768px){

.success-card{

padding:30px;

}

h1{

font-size:28px;

}

.check{

width:90px;

height:90px;

font-size:45px;

}

}

</style>

</head>

<body>

<div class="success-card">

<div class="check">

✓

</div>

<h1>

Thank You!

</h1>

<p>

Your order has been received successfully.

Our LASTELLA team will contact you on WhatsApp shortly to confirm your order.

</p>

<div class="order-box">

<h3>Order Status</h3>

<p>✅ Order Received</p>

<p>📦 Preparing Confirmation</p>

<p>📲 WhatsApp Confirmation Soon</p>

</div>

<a href="index.html" class="button">

Continue Shopping

</a>

<div class="small">

❤️ Thank you for choosing LASTELLA Jewellery ❤️

</div>

</div>

</body>

</html>
